<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý danh sách bài hát</title>
<link rel="stylesheet" href="./style.css">
<style>
    body {
        font-family: Arial;
        padding: 20px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
    }

    th, td {
        border: 1px solid #ccc;
        padding: 8px;
        text-align: center;
    }

    button {
        margin: 2px;
        padding: 5px 10px;
        cursor: pointer;
    }

    input {
        padding: 6px;
        margin: 5px 0;
        width: 250px;
    }
</style>

</head>
<body>

<h2 id="formTitle">Thêm bài hát</h2>

<form id="songForm">

    <div>
        <label>Tên bài hát:</label><br>
        <input type="text" id="songName">
    </div>

    <div>
        <label>Ca sĩ:</label><br>
        <input type="text" id="singer">
    </div>

    <button type="submit" id="submitBtn">
        Thêm bài hát
    </button>

</form>

<hr>

<h3>Tìm kiếm bài hát</h3>

<input
    type="text"
    id="searchInput"
    placeholder="Nhập tên bài hát..."
>

<table>

    <thead>
        <tr>
            <th>ID</th>
            <th>Tên bài hát</th>
            <th>Ca sĩ</th>
            <th>Thao tác</th>
        </tr>
    </thead>

    <tbody id="songTableBody">

    </tbody>

</table>

<script>

let songs =
    JSON.parse(localStorage.getItem("songs"))
    || [];

let editingId = null;

let songForm =
    document.getElementById("songForm");

let songName =
    document.getElementById("songName");

let singer =
    document.getElementById("singer");

let songTableBody =
    document.getElementById("songTableBody");

let formTitle =
    document.getElementById("formTitle");

let submitBtn =
    document.getElementById("submitBtn");

let searchInput =
    document.getElementById("searchInput");

function saveToLocalStorage() {
    localStorage.setItem(
        "songs",
        JSON.stringify(songs)
    );
}

function renderSongs(list = songs) {

    let html = "";

    list.forEach(function(song) {

        html += `
        <tr>

            <td>${song.id}</td>

            <td>${song.name}</td>

            <td>${song.singer}</td>

            <td>

                <button
                    onclick="editSong(${song.id})"
                >
                    Sửa
                </button>

                <button
                    onclick="deleteSong(${song.id})"
                >
                    Xóa
                </button>

            </td>

        </tr>
        `;
    });

    songTableBody.innerHTML = html;
}

songForm.addEventListener(
    "submit",
    function(e) {

        e.preventDefault();

        let name =
            songName.value.trim();

        let singerValue =
            singer.value.trim();

        if (name === "" || singerValue === "") {
            alert("Không được để trống");
            return;
        }

        if (editingId === null) {

            let newSong = {
                id:
                    songs.length > 0
                    ? songs[songs.length - 1].id + 1
                    : 1,

                name: name,

                singer: singerValue
            };

            songs.push(newSong);

        } else {

            let index =
                songs.findIndex(
                    function(song) {
                        return song.id === editingId;
                    }
                );

            songs[index].name = name;

            songs[index].singer = singerValue;

            editingId = null;

            formTitle.textContent =
                "Thêm bài hát";

            submitBtn.textContent =
                "Thêm bài hát";
        }

        saveToLocalStorage();

        songForm.reset();

        renderSongs();
    }
);

function editSong(id) {

    let song =
        songs.find(
            function(item) {
                return item.id === id;
            }
        );

    if (song) {

        songName.value =
            song.name;

        singer.value =
            song.singer;

        editingId = id;

        formTitle.textContent =
            "Sửa bài hát";

        submitBtn.textContent =
            "Cập nhật";
    }
}

function deleteSong(id) {

    let confirmDelete =
        confirm("Bạn có chắc muốn xóa?");

    if (confirmDelete) {

        songs =
            songs.filter(
                function(song) {
                    return song.id !== id;
                }
            );

        saveToLocalStorage();

        renderSongs();
    }
}

searchInput.addEventListener(
    "input",
    function() {

        let keyword =
            searchInput.value
            .toLowerCase();

        let result =
            songs.filter(
                function(song) {

                    return song.name
                        .toLowerCase()
                        .includes(keyword);

                }
            );

        renderSongs(result);
    }
);

renderSongs();

</script>

</body>
</html>
