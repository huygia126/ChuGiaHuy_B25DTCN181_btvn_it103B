<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Danh Sách Sản Phẩm Chợ Tết</h1>
    <ul id="product-list">
        <!-- Danh sách sản phẩm-->
         <li li class="product-item"></li>
    </ul>
    <form id="product-form">
        <input type="text" id="product-name" placeholder="Tên sản phẩm" >
        <input type="number" id="product-price" placeholder="Giá (VND)">
        <button type="submit">Thêm sản phẩm</button>
    </form>
        <script>
        const products = [
            { id: 1, name: "Bánh trưng", price: 150000 },
            { id: 2, name: "Giò lụa", price: 180000 },
            { id: 3, name: "Cành đào", price: 500000 },
            { id: 4, name: "Mứt tết", price: 120000 },
            { id: 5, name: "Bao lì xì", price: 25000 },
            { id: 6, name: "Dưa hấu tết", price: 80000 },
        ];
        const productForm = document.getElementById('product-form');
        const productNameInput = document.getElementById('product-name');
        const productPriceInput = document.getElementById('product-price');
        const productList = document.getElementById('product-list');
        productForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const name = productNameInput.value.trim();
            const price = productPriceInput.value;
            if (!name || !price) return alert("Nhập đủ thông tin đã bạn ơi!");
            const li = document.createElement('li');
            li.className = 'product-item';
            li.innerHTML = `
                <span>${name} - ${Number(price).toLocaleString()} VND</span>
                <button class="delete-btn">Xóa</button>
            `;
            productList.appendChild(li);
            productForm.reset();
        });
        productList.addEventListener('click', function(e) {
            if (e.target.classList.contains('delete-btn')) {
                const isConfirmed = confirm("Bạn có chắc muốn xóa sản phẩm này khỏi giỏ hàng Tết không?");
                if (isConfirmed) {
                    const itemToRemove = e.target.parentElement;
                    itemToRemove.remove();
                }
            }
        });
        </script>
</body>
</html>
